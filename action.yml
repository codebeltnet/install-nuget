name: Install NuGet CLI from Codebelt
description: Install a given version of NuGet CLI.
inputs:
  token:
    description: The NuGet API key.
    required: true
  version:
    description: The version of NuGet CLI to install. Default is 7.3.
    required: false
    default: '7.3'
runs:
  using: composite
  steps:
    - name: Install NuGet CLI
      uses: nuget/setup-nuget@v4
      with:
        nuget-version: ${{ inputs.version }}
        nuget-api-key: ${{ inputs.token }}
branding:
  icon: 'umbrella'
  color: 'blue'
